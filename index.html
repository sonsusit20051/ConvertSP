<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convert Link Shopee</title>
  <link rel="icon" type="image/png" href="favicon.png?v=20260301.5" />
  <link rel="stylesheet" href="assets/css/styles.css?v=20260304.1" />
</head>
<body>
  <main class="page">
    <section class="shell">
      <header class="hero">
        <h1>Convert Link Shopee</h1>
        <span class="badge">Chỉ 1 link/lần</span>
      </header>

      <section class="mode-grid" aria-label="Chọn nguồn chuyển đổi">
        <button id="modeFb" type="button" class="mode-card is-active" data-source="fb" aria-pressed="true">
          <span class="mode-icon mode-icon-fb">
            <img src="2023_Facebook_icon.svg.webp" alt="Facebook" />
          </span>
          <span class="mode-text">Đổi mã Facebook</span>
        </button>
        <button id="modeYt" type="button" class="mode-card" data-source="yt" aria-pressed="false">
          <span class="mode-icon mode-icon-yt">
            <img src="Youtube_logo.png" alt="Youtube" />
          </span>
          <span class="mode-text">Đổi mã Youtube</span>
        </button>
      </section>

      <section id="mainPanel" class="panel">
        <label for="inp" class="label">Nhập link Shopee</label>
        <div class="input-wrap">
          <input
            id="inp"
            class="input"
            placeholder="Dán link tại đây"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
          <button id="btnPaste" type="button" class="paste-btn" aria-label="Dán sản phẩm" title="Dán sản phẩm">📋</button>
        </div>

        <div class="btnrow">
          <button id="btnConvert" type="button" class="btn btn-primary">Nhận voucher</button>
          <button id="btnCopy" type="button" class="btn btn-copy" disabled>Sao chép</button>
          <button id="btnOpen" type="button" class="btn btn-buy" disabled>Mua ngay</button>
        </div>

        <div id="resultWrap" class="result" aria-live="polite">
          <div class="result-title">Kết quả</div>
          <span id="resultPreview" class="result-link">Kết quả sẽ hiển thị ở đây...</span>
        </div>

        <p id="status" class="status"></p>

        <div id="ytOnlyMessage" class="yt-only-message" aria-live="polite">
          Đang làm sếp ơi, sắp xong rồii
        </div>
      </section>
    </section>
  </main>

  <div class="signature">
    <span>product by <b>Sơn moi</b></span>
    <span class="contact" aria-label="Liên hệ">
      <a class="contact-link" href="https://www.facebook.com/sonmoi24.09" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <img src="2023_Facebook_icon.svg.webp" alt="Facebook" />
      </a>
      <a class="contact-link" href="https://zalo.me/0353025356" target="_blank" rel="noopener noreferrer" aria-label="Zalo">
        <img src="Icon_of_Zalo.svg.webp" alt="Zalo" />
      </a>
    </span>
  </div>

  <script defer src="assets/js/config.js?v=20260303.11"></script>
  <script defer src="assets/js/dom.js?v=20260304.2"></script>
  <script defer src="assets/js/state.js?v=20260303.10"></script>
  <script defer src="assets/js/ui.js?v=20260304.2"></script>
  <script defer src="assets/js/validators.js?v=20260304.1"></script>
  <script defer src="assets/js/clipboard.js?v=20260303.10"></script>
  <script defer src="assets/js/api.js?v=20260304.1"></script>
  <script defer src="assets/js/actions.js?v=20260304.2"></script>
  <script defer src="assets/js/bootstrap.js?v=20260304.2"></script>
</body>
</html>
